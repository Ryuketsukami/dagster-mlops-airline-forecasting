name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "docs/**"
      - "infra/**"
      - "README.md"
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.ref }}/ci
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  # ── 2. Unit tests ──────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: |
          mkdir -p /tmp/dagster_home
          uv run pytest tests/ -v --tb=short
        env:
          DAGSTER_HOME: /tmp/dagster_home
          GCP_PROJECT_ID: "test-project"
          GCS_BUCKET_NAME: "test-bucket"
          BIGQUERY_DATASET: "test_dataset"
          BIGQUERY_LOCATION: "US"

  # ── 3. Validate Dagster definitions ────────────────────────────────────────
  validate-definitions:
    name: Validate Dagster Definitions
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Validate Dagster definitions
        run: |
          mkdir -p /tmp/dagster_home
          uv run dagster definitions validate -m quickstart_etl.definitions
        env:
          DAGSTER_HOME: /tmp/dagster_home
          # Dummy values — validate only checks import-time correctness,
          # it never connects to GCP or any external service
          GCP_PROJECT_ID: "test-project"
          GCS_BUCKET_NAME: "test-bucket"
          BIGQUERY_DATASET: "test_dataset"
          BIGQUERY_LOCATION: "EU"

  # ── 4. Deploy to Dagster+ Serverless (main branch only) ────────────────────
  # dagster-cloud-action reads dagster_cloud.yaml and builds a PEX for Serverless.
  # No custom Docker image — Dagster manages the execution environment.
  deploy:
    name: Deploy to Dagster+ Serverless
    runs-on: ubuntu-22.04
    needs: [test, validate-definitions]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy code location
        uses: dagster-io/dagster-cloud-action@v0.1
        with:
          dagster_cloud_api_token: ${{ secrets.DAGSTER_CLOUD_API_TOKEN }}
          organization_id: mevmav
          deployment: prod
          python_version: ${{ env.PYTHON_VERSION }}

